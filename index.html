<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portal | Demon Hunter</title>
  <meta name="description" content="Portal principal del universo Demon Hunter: acceso a Las Crónicas de Sasha, Pay & Play System y lore expandido en World Anvil." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://demonhunterpyp-cell.github.io/las-cronicas-de-sasha/index.html" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Portal | Demon Hunter" />
  <meta property="og:description" content="Accede a Las Crónicas de Sasha, Pay & Play System y el lore expandido del universo Demon Hunter." />
  <meta property="og:image" content="https://demonhunterpyp-cell.github.io/las-cronicas-de-sasha/portal/portal-sasha.png" />
  <meta property="og:url" content="https://demonhunterpyp-cell.github.io/las-cronicas-de-sasha/index.html" />

  <style>
    :root{
      --bg:#05070d;
      --gold:#d8b160;
      --gold-2:#b78537;
      --gold-3:#f2d68f;
      --text:#f7eedc;
      --soft:#d7c6a4;
      --muted:#9f9277;
      --line:rgba(216,177,96,.26);
      --blue:#6bd5e9;
      --red:#b44835;
      --shadow:0 28px 70px rgba(0,0,0,.46);
      --maxw:1420px;
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100vh;
      font-family:Georgia, "Times New Roman", serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 42%, rgba(216,177,96,.14), transparent 28%),
        radial-gradient(circle at 16% 22%, rgba(180,72,53,.14), transparent 24%),
        radial-gradient(circle at 84% 22%, rgba(107,213,233,.10), transparent 24%),
        linear-gradient(180deg, #05070d 0%, #101827 48%, #070a11 100%);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(216,177,96,.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(216,177,96,.026) 1px, transparent 1px);
      background-size:52px 52px;
      mask-image:radial-gradient(circle at 50% 46%, rgba(0,0,0,.82), transparent 78%);
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 58%, transparent 0 42%, rgba(0,0,0,.36) 82%),
        linear-gradient(90deg, rgba(0,0,0,.42), transparent 30%, transparent 70%, rgba(0,0,0,.34));
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      max-width:100%;
    }

    .page{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:26px;
    }

    .portal-shell{
      position:relative;
      width:min(var(--maxw), 100%);
      height:calc(100vh - 52px);
      min-height:620px;
      border-radius:34px;
      overflow:hidden;
      border:1px solid rgba(216,177,96,.20);
      background:
        radial-gradient(circle at 50% 50%, rgba(216,177,96,.10), transparent 28%),
        linear-gradient(180deg, rgba(21,29,45,.92), rgba(7,10,17,.96));
      box-shadow:var(--shadow);
    }

    .portal-shell::before{
      content:"";
      position:absolute;
      inset:14px;
      z-index:6;
      pointer-events:none;
      border:1px solid rgba(216,177,96,.10);
      border-radius:24px;
    }

    .portal-shell::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:5;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(216,177,96,.10), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.035), transparent 38%, rgba(0,0,0,.18));
    }

    .portal-stage{
      position:absolute;
      inset:0;
      display:block;
    }

    .portal-panel{
      position:absolute;
      inset:0;
      overflow:hidden;
      isolation:isolate;
      transition:filter .28s ease, transform .28s ease;
    }

    .portal-panel::before{
      content:"";
      position:absolute;
      inset:-2%;
      z-index:0;
      background-size:cover;
      background-repeat:no-repeat;
      opacity:.91;
      transform:scale(1.01);
      transition:transform .38s ease, filter .38s ease, opacity .38s ease;
    }

    .portal-panel::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      opacity:.88;
      transition:opacity .28s ease, background .28s ease;
    }

    .portal-panel:hover,
    .portal-panel:focus-visible{
      z-index:4;
      filter:brightness(1.10) saturate(1.05);
      outline:none;
    }

    .portal-panel:hover::before,
    .portal-panel:focus-visible::before{
      transform:scale(1.055);
      filter:brightness(1.16) saturate(1.08);
      opacity:1;
    }

    .portal-panel:hover::after,
    .portal-panel:focus-visible::after{
      opacity:.70;
    }

    .panel-novelas{
      clip-path:polygon(0 0, 50% 50%, 0 100%);
    }

    .panel-novelas::before{
      background-image:url("portal/portal-sasha.png");
      background-position:left center;
      background-size:74% auto;
    }

    .panel-novelas::after{
      background:
        linear-gradient(90deg, rgba(4,6,11,.14), rgba(4,6,11,.08) 44%, rgba(4,6,11,.46)),
        radial-gradient(circle at 20% 52%, rgba(216,177,96,.16), transparent 28%);
    }

    .panel-rol{
      clip-path:polygon(0 0, 100% 0, 50% 50%);
    }

    .panel-rol::before{
      background-image:url("portal/portal-payplay.png");
      background-position:center 26%;
      background-size:min(34vw, 440px) auto;
    }

    .panel-rol::after{
      background:
        radial-gradient(circle at 50% 24%, rgba(107,213,233,.18), transparent 28%),
        linear-gradient(180deg, rgba(5,8,16,.14), rgba(5,8,16,.42));
    }

    .panel-lore{
      clip-path:polygon(100% 0, 50% 50%, 100% 100%);
    }

    .panel-lore::before{
      background-image:url("portal/portal-mundo.jpg");
      background-position:right center;
      background-size:82% auto;
    }

    .panel-lore::after{
      background:
        linear-gradient(270deg, rgba(4,6,11,.08), rgba(4,6,11,.12) 42%, rgba(4,6,11,.50)),
        radial-gradient(circle at 82% 48%, rgba(107,213,233,.13), transparent 30%);
    }

    .portal-center{
      position:absolute;
      left:50%;
      top:50%;
      z-index:10;
      transform:translate(-50%, -50%);
      width:clamp(126px, 14vw, 190px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      border-radius:50%;
      border:1px solid rgba(216,177,96,.34);
      background:
        radial-gradient(circle at 50% 38%, rgba(216,177,96,.16), transparent 50%),
        rgba(5,7,13,.62);
      box-shadow:
        0 0 34px rgba(216,177,96,.18),
        0 18px 46px rgba(0,0,0,.38),
        inset 0 0 24px rgba(216,177,96,.08);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      pointer-events:none;
    }

    .portal-center span{
      color:#f7d889;
      text-align:center;
      font-size:clamp(.82rem, 1.5vw, 1.05rem);
      line-height:1.18;
      letter-spacing:.12em;
      text-transform:uppercase;
      text-shadow:0 0 16px rgba(216,177,96,.30);
    }

    .portal-label{
      position:absolute;
      z-index:8;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      max-width:260px;
      padding:11px 14px 12px;
      border-radius:18px;
      border:1px solid rgba(216,177,96,.22);
      background:rgba(5,7,13,.56);
      color:var(--soft);
      text-align:center;
      box-shadow:
        0 14px 34px rgba(0,0,0,.28),
        inset 0 0 16px rgba(216,177,96,.035);
      backdrop-filter:blur(7px);
      -webkit-backdrop-filter:blur(7px);
      pointer-events:none;
      transition:transform .25s ease, background .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .portal-panel:hover .portal-label,
    .portal-panel:focus-visible .portal-label{
      background:rgba(5,7,13,.70);
      border-color:rgba(216,177,96,.42);
      box-shadow:
        0 18px 38px rgba(0,0,0,.34),
        0 0 22px rgba(216,177,96,.16);
    }

    .portal-label small{
      display:block;
      margin-bottom:6px;
      color:var(--gold);
      font-size:.72rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-weight:700;
    }

    .portal-label strong{
      display:block;
      color:#f7eedc;
      font-size:clamp(1rem, 1.8vw, 1.42rem);
      line-height:1.02;
      letter-spacing:.01em;
    }

    .portal-label span{
      display:block;
      margin-top:6px;
      color:rgba(215,198,164,.82);
      font-size:.82rem;
      line-height:1.34;
    }

    .label-novelas{
      left:30%;
      top:54%;
      transform:translate(-50%, -50%);
    }

    .label-rol{
      left:50%;
      top:28%;
      transform:translate(-50%, -50%);
    }

    .label-lore{
      left:70%;
      top:54%;
      transform:translate(-50%, -50%);
    }

    .portal-panel:hover .label-novelas,
    .portal-panel:focus-visible .label-novelas,
    .portal-panel:hover .label-rol,
    .portal-panel:focus-visible .label-rol,
    .portal-panel:hover .label-lore,
    .portal-panel:focus-visible .label-lore{
      transform:translate(-50%, -50%) translateY(-3px);
    }

    .desktop-title{
      position:absolute;
      left:50%;
      bottom:24px;
      z-index:12;
      transform:translateX(-50%);
      width:max-content;
      max-width:calc(100% - 46px);
      padding:9px 14px;
      border-radius:999px;
      border:1px solid rgba(216,177,96,.16);
      background:rgba(5,7,13,.40);
      color:rgba(215,198,164,.70);
      text-align:center;
      font-size:.82rem;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      pointer-events:none;
    }

    @media (max-width: 700px){
      body{
        overflow:auto;
      }

      .page{
        min-height:100vh;
        display:block;
        padding:12px;
      }

      .portal-shell{
        height:auto;
        min-height:calc(100vh - 24px);
        border-radius:24px;
      }

      .portal-stage{
        position:relative;
        inset:auto;
        display:grid;
        gap:12px;
        padding:18px 14px;
      }

      .portal-shell::before,
      .portal-shell::after,
      .portal-center,
      .desktop-title{
        display:none;
      }

      .portal-panel{
        position:relative;
        inset:auto;
        min-height:190px;
        border-radius:22px;
        clip-path:none !important;
        border:1px solid rgba(216,177,96,.18);
      }

      .portal-panel::before{
        inset:0;
        transform:none;
      }

      .panel-novelas::before{
        background-position:center 28%;
        background-size:cover;
      }

      .panel-rol::before{
        background-position:center 36%;
        background-size:min(76vw, 360px) auto;
      }

      .panel-lore::before{
        background-position:center center;
        background-size:cover;
      }

      .portal-panel::after{
        background:
          linear-gradient(180deg, rgba(5,7,13,.08), rgba(5,7,13,.34) 46%, rgba(5,7,13,.88) 100%),
          radial-gradient(circle at 80% 0%, rgba(216,177,96,.12), transparent 34%);
      }

      .portal-label{
        position:absolute;
        left:18px !important;
        right:18px;
        bottom:18px;
        top:auto !important;
        max-width:none;
        transform:none !important;
        align-items:flex-start;
        text-align:left;
        background:rgba(5,7,13,.62);
      }

      .portal-label strong{
        font-size:clamp(1.45rem, 7vw, 2.2rem);
      }

      .portal-label span{
        font-size:.9rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="portal-shell" aria-label="Portal principal de Demon Hunter">
      <div class="portal-stage">
        <a class="portal-panel panel-novelas" href="cronicas/index.html" aria-label="Entrar en Las Crónicas de Sasha">
          <span class="portal-label label-novelas">
            <small>Novelas</small>
            <strong>Las Crónicas de Sasha</strong>
            <span>Saga principal</span>
          </span>
        </a>

        <a class="portal-panel panel-rol" href="systempyp/index.html" aria-label="Entrar en Pay and Play System">
          <span class="portal-label label-rol">
            <small>Rol</small>
            <strong>Pay &amp; Play System</strong>
            <span>Reglas y juego</span>
          </span>
        </a>

        <a class="portal-panel panel-lore" href="https://www.worldanvil.com/w/demon-hunter-tabanne" target="_blank" rel="noopener noreferrer" aria-label="Abrir el lore expandido en World Anvil">
          <span class="portal-label label-lore">
            <small>Lore</small>
            <strong>Demon Hunter</strong>
            <span>World Anvil</span>
          </span>
        </a>

        <div class="portal-center" aria-hidden="true">
          <span>Demon<br>Hunter</span>
        </div>

        <div class="desktop-title" aria-hidden="true">
          Portal de acceso · Novelas · Rol · Lore
        </div>
      </div>
    </section>
  </main>
</body>
</html>
