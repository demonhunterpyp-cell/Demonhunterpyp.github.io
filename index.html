<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal | DemonHunter</title>
  <meta name="description" content="Portal de acceso al universo DemonHunter: novela, lore expandido y sistema de juego." />
  <style>
    :root{
      --bg:#050912;
      --bg-2:#0b1322;
      --gold:#d8b160;
      --line:rgba(240,200,111,.34);
      --text:#f7eedc;
      --pill-bg:rgba(8,12,22,.42);
      --pill-border:rgba(216,177,96,.22);
      --shadow:0 14px 30px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      min-height:100vh;
      font-family:Georgia, "Times New Roman", serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(216,177,96,.05), transparent 18%),
        radial-gradient(circle at 80% 15%, rgba(216,177,96,.05), transparent 20%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .portal{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      isolation:isolate;
      background:#050912;
    }

    .portal::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 58%, rgba(255,220,150,.04), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.01), rgba(0,0,0,.06));
      pointer-events:none;
      z-index:1;
    }

    .portal-title{
      position:absolute;
      left:50%;
      top:10px;
      transform:translateX(-50%);
      z-index:12;
      text-align:center;
      padding:8px 18px;
      border-radius:999px;
      background:rgba(7,11,19,.42);
      border:1px solid rgba(216,177,96,.18);
      color:#f4e7cb;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:.82rem;
    }

    .portal-lines{
      position:absolute;
      inset:0;
      z-index:6;
      pointer-events:none;
    }

    .portal-lines svg{
      width:100%;
      height:100%;
      display:block;
    }

    .portal-center{
      position:absolute;
      left:50%;
      top:58%;
      transform:translate(-50%, -50%);
      z-index:9;
      width:18px;
      height:18px;
      border-radius:50%;
      background:radial-gradient(circle, #f0c86f 0%, #c28a39 60%, rgba(194,138,57,0) 100%);
      box-shadow:0 0 18px rgba(240,200,111,.55);
      pointer-events:none;
    }

    .panel{
      position:absolute;
      inset:0;
      overflow:hidden;
      display:block;
      cursor:pointer;
      transition:transform .22s ease;
    }

    .panel:hover,
    .panel:focus-visible{
      z-index:7;
      outline:none;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background-size:cover;
      background-repeat:no-repeat;
      background-position:center center;
      transition:transform .28s ease;
    }

    .panel:hover::before,
    .panel:focus-visible::before{
      transform:scale(1.01);
    }

    .panel-top{
      clip-path:polygon(0 0, 100% 0, 50% 58%);
      z-index:2;
      background:
        radial-gradient(circle at 50% 34%, rgba(216,177,96,.08), transparent 22%),
        linear-gradient(180deg, #040506 0%, #090b11 100%);
    }

    .panel-left{
      clip-path:polygon(0 0, 50% 58%, 50% 100%, 0 100%);
      z-index:3;
    }

    .panel-right{
      clip-path:polygon(100% 0, 50% 58%, 50% 100%, 100% 100%);
      z-index:3;
    }

    /* IZQUIERDA */
    .panel-left::before{
      background-image:
        linear-gradient(180deg, rgba(20,11,7,.03) 0%, rgba(20,11,7,.12) 100%),
        url("assets/portal/portal-sasha.jpg");
      background-position:22% center;
    }

    .panel-left::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.03), rgba(0,0,0,.08)),
        linear-gradient(90deg, rgba(0,0,0,.10), rgba(0,0,0,.02) 40%, rgba(0,0,0,.08) 100%);
      pointer-events:none;
      z-index:2;
    }

    /* DERECHA */
    .panel-right::before{
      background-image:
        linear-gradient(180deg, rgba(6,10,18,.08) 0%, rgba(6,10,18,.18) 100%),
        url("assets/portal/portal-lore.jpg");
      background-position:center center;
    }

    .panel-right::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.14)),
        linear-gradient(90deg, rgba(0,0,0,.03), rgba(0,0,0,.14));
      pointer-events:none;
      z-index:2;
    }

    /* LOGO SUPERIOR */
    .system-logo{
      position:absolute;
      z-index:10;
      left:50%;
      top:40%;
      transform:translate(-50%, -50%);
      width:min(660px, 52vw);
      display:flex;
      justify-content:center;
      align-items:center;
      pointer-events:none;
    }

    .system-logo img{
      display:block;
      width:100%;
      height:auto;
      object-fit:contain;
      filter:drop-shadow(0 14px 28px rgba(0,0,0,.34));
    }

    /* ETIQUETAS MÍNIMAS */
    .mini-tag{
      position:absolute;
      z-index:11;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:108px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--pill-border);
      background:var(--pill-bg);
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:.9rem;
      font-weight:700;
      box-shadow:var(--shadow);
      transition:transform .22s ease, border-color .22s ease, background .22s ease;
    }

    .panel:hover .mini-tag,
    .panel:focus-visible .mini-tag{
      transform:translateY(-2px);
      border-color:rgba(216,177,96,.30);
      background:rgba(8,12,22,.48);
    }

    .tag-top{
      left:50%;
      top:62px;
      transform:translateX(-50%);
    }

    .panel-top:hover .tag-top,
    .panel-top:focus-visible .tag-top{
      transform:translateX(-50%) translateY(-2px);
    }

    .tag-left{
      left:36px;
      bottom:34px;
    }

    .tag-right{
      right:36px;
      bottom:34px;
    }

    @media (max-width: 1180px){
      .system-logo{
        width:min(560px, 50vw);
      }
    }

    @media (max-width: 980px){
      body{overflow:auto}

      .portal{
        height:auto;
        min-height:100vh;
        display:grid;
        grid-template-columns:1fr;
      }

      .portal-lines,
      .portal-center{
        display:none;
      }

      .panel{
        position:relative;
        inset:auto;
        min-height:33.333vh;
        clip-path:none !important;
      }

      .panel::before{
        background-position:center center !important;
        transform:none !important;
      }

      .system-logo,
      .tag-top,
      .tag-left,
      .tag-right{
        position:relative;
        left:auto;
        right:auto;
        top:auto;
        bottom:auto;
        transform:none !important;
        margin:22px auto;
      }

      .system-logo{
        width:min(460px, 84vw);
      }

      .mini-tag{
        min-width:120px;
      }
    }
  </style>
</head>
<body>

  <main class="portal">
    <div class="portal-title">Portal de acceso</div>
    <div class="portal-center"></div>

    <div class="portal-lines" aria-hidden="true">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <line x1="0" y1="0" x2="50" y2="58" stroke="rgba(240,200,111,.34)" stroke-width="0.22"/>
        <line x1="100" y1="0" x2="50" y2="58" stroke="rgba(240,200,111,.34)" stroke-width="0.22"/>
        <line x1="50" y1="58" x2="50" y2="100" stroke="rgba(240,200,111,.34)" stroke-width="0.22"/>
      </svg>
    </div>

    <!-- SUPERIOR -->
    <a class="panel panel-top" href="systempyp/index.html" aria-label="Ir a Pay and Play Rol System">
      <div class="mini-tag tag-top">Rol</div>
      <div class="system-logo">
        <img src="assets/portal/portal-payplay.png" alt="Logo de Pay and Play Rol System">
      </div>
    </a>

    <!-- IZQUIERDA -->
    <a class="panel panel-left" href="cronicas/index.html" aria-label="Ir a Las Crónicas de Sasha">
      <div class="mini-tag tag-left">Novela</div>
    </a>

    <!-- DERECHA -->
    <a class="panel panel-right" href="https://www.worldanvil.com/w/demon-hunter-tabanne" target="_blank" rel="noopener noreferrer" aria-label="Ir a World Anvil">
      <div class="mini-tag tag-right">Lore</div>
    </a>
  </main>

</body>
</html>
